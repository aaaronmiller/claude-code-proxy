<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy Control — Settings</title>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        fontFamily: {
          mono: ['"JetBrains Mono"', '"Fira Code"', '"Cascadia Code"', 'monospace'],
        },
        colors: {
          forge: {
            bg:       '#080810',
            deep:     '#0c0c16',
            card:     '#0f0f1a',
            border:   '#1a1a2e',
            line:     '#141420',
            hover:    '#131320',
            cyan:     '#00d9ff',
            'cyan-dim':'#003d48',
            amber:    '#f59e0b',
            'amber-dim':'#3d2800',
            green:    '#22c55e',
            'green-dim':'#052010',
            red:      '#f87171',
            'red-dim':'#280808',
            muted:    '#4a4a6a',
            text:     '#c8c8e8',
            dim:      '#5a5a7a',
            faint:    '#2a2a3a',
          }
        }
      }
    }
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080810;
    --deep:     #0c0c16;
    --card:     #0f0f1a;
    --border:   #1a1a2e;
    --line:     #141420;
    --hover:    #131320;
    --cyan:     #00d9ff;
    --cyan-dim: #003d48;
    --amber:    #f59e0b;
    --green:    #22c55e;
    --red:      #f87171;
    --text:     #c8c8e8;
    --dim:      #5a5a7a;
    --muted:    #4a4a6a;
    --faint:    #2a2a3a;
    --font: 'JetBrains Mono', 'Fira Code', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    -webkit-font-smoothing: antialiased;
  }

  /* Noise grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9998;
    pointer-events: none;
    opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 128px;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    z-index: 9997;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0, 0, 0, 0.06) 3px,
      rgba(0, 0, 0, 0.06) 4px
    );
  }

  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: var(--deep); }
  ::-webkit-scrollbar-thumb { background: var(--faint); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── Toggle switch ───────────────────────────────── */
  .tgl { position: relative; display: inline-flex; align-items: center; cursor: pointer; }
  .tgl input { opacity: 0; width: 0; height: 0; position: absolute; }
  .tgl-track {
    width: 32px; height: 16px;
    background: var(--faint);
    border: 1px solid var(--muted);
    border-radius: 8px;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .tgl input:checked + .tgl-track {
    background: var(--cyan-dim);
    border-color: var(--cyan);
  }
  .tgl-track::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--dim);
    transition: transform 0.15s, background 0.15s;
  }
  .tgl input:checked + .tgl-track::after {
    transform: translateX(16px);
    background: var(--cyan);
  }

  /* ── Field inputs ────────────────────────────────── */
  .fi {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--faint);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 0 3px 4px;
    width: 100%;
    transition: border-color 0.12s;
    outline: none;
  }
  .fi:focus { border-bottom-color: var(--cyan); }
  .fi.mod { border-bottom-color: var(--amber); color: var(--amber); }
  .fi::placeholder { color: var(--muted); font-size: 10px; }

  .fs {
    background: var(--deep);
    border: 1px solid var(--faint);
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 3px 6px;
    width: 100%;
    cursor: pointer;
    outline: none;
    transition: border-color 0.12s;
  }
  .fs:focus { border-color: var(--cyan); }
  .fs.mod { border-color: var(--amber); color: var(--amber); }

  /* ── Section header ──────────────────────────────── */
  .sec-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 0 10px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .sec-head-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--dim);
    padding-left: 8px;
    border-left: 2px solid var(--cyan);
  }

  /* ── Nav item ────────────────────────────────────── */
  .nv-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    text-align: left;
    padding: 6px 12px;
    font-size: 11px;
    color: var(--dim);
    transition: background 0.1s, color 0.1s;
    cursor: pointer;
    background: none;
    border: none;
    border-left: 2px solid transparent;
  }
  .nv-item:hover { background: var(--hover); color: var(--text); }
  .nv-item.active {
    background: rgba(0, 217, 255, 0.06);
    color: var(--cyan);
    border-left-color: var(--cyan);
  }

  /* ── Field row ───────────────────────────────────── */
  .fr {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
    padding: 8px 14px;
    border-bottom: 1px solid var(--line);
    transition: background 0.1s;
  }
  .fr:last-child { border-bottom: none; }
  .fr:hover { background: var(--hover); }

  /* ── Card container ──────────────────────────────── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
  }

  /* ── Grade display (ASCII box) ───────────────────── */
  .grade-box {
    font-size: 10px;
    font-family: var(--font);
    color: var(--cyan);
    white-space: pre;
    line-height: 1.3;
    letter-spacing: 0;
  }
  .grade-S { color: #22c55e; }
  .grade-A { color: var(--cyan); }
  .grade-B { color: var(--amber); }
  .grade-C { color: #f97316; }
  .grade-F { color: var(--red); }

  /* ── Breaker badges ──────────────────────────────── */
  .b-closed { color: var(--green); }
  .b-open   { color: var(--red);   }
  .b-half   { color: var(--amber); }

  /* ── Toast ───────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 20px; right: 20px; z-index: 9999;
    padding: 8px 16px;
    font-family: var(--font); font-size: 11px;
    border: 1px solid; display: flex; align-items: center; gap: 8px;
    animation: toast-in 0.15s ease-out;
  }
  .toast-success { background: #030f08; border-color: var(--green); color: var(--green); }
  .toast-error   { background: #0f0303; border-color: var(--red);   color: var(--red);   }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Gauge bar ───────────────────────────────────── */
  .gauge { height: 2px; background: var(--faint); position: relative; overflow: hidden; }
  .gauge-fill { height: 100%; transition: width 0.5s ease-out; }

  /* ── Blink ───────────────────────────────────────── */
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
  .blink { animation: blink 1.2s step-end infinite; }

  /* ── Pulse dot ───────────────────────────────────── */
  @keyframes pdot { 0%,100%{box-shadow:0 0 0 0 rgba(0,217,255,.4)} 50%{box-shadow:0 0 0 4px rgba(0,217,255,0)} }
  .pdot { animation: pdot 2s ease infinite; }

  /* ── Fade in ─────────────────────────────────────── */
  @keyframes fi-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
  .fi-in { animation: fi-in 0.15s ease-out; }

  /* ── 2-col grid for settings ──────────────────────── */
  @media (min-width: 900px) {
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .settings-grid .fr { border-right: 1px solid var(--line); }
    .settings-grid .fr:nth-child(even) { border-right: none; }
  }

  /* ── Mod pill ────────────────────────────────────── */
  .mod-pill {
    font-size: 8px; font-weight: 600; letter-spacing: 0.08em;
    padding: 1px 5px;
    background: rgba(245,158,11,0.12);
    color: var(--amber);
    border: 1px solid rgba(245,158,11,0.3);
    text-transform: uppercase;
  }

  /* ── Control width ───────────────────────────────── */
  .ctrl { width: 160px; min-width: 160px; }

  /* ── Header top bar ──────────────────────────────── */
  .topbar {
    height: 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    background: var(--deep);
    flex-shrink: 0;
  }
</style>
</head>
<body class="h-full" x-data="proxySettings()" x-init="init()">

<!-- Toast -->
<template x-if="toast.show">
  <div :class="['toast', toast.type === 'success' ? 'toast-success' : 'toast-error']" x-text="toast.message"></div>
</template>

<div class="flex h-screen overflow-hidden">

  <!-- ══ SIDEBAR ═════════════════════════════════════════════════ -->
  <aside style="width:200px;min-width:200px;background:var(--deep);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;">

    <!-- Logo bar -->
    <div class="topbar">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="color:var(--cyan)">
        <path stroke="currentColor" stroke-width="2.5" stroke-linecap="round" d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span style="font-size:11px;font-weight:600;color:var(--text);letter-spacing:.06em;">PROXY CTL</span>
      <span style="font-size:9px;color:var(--muted);margin-left:auto;">v2</span>
    </div>

    <!-- Status -->
    <div style="padding:8px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;">
      <div
        :class="proxyStatus === 'online' ? 'pdot' : ''"
        :style="'width:6px;height:6px;border-radius:50%;background:' + (proxyStatus === 'online' ? 'var(--cyan)' : 'var(--red)')"
      ></div>
      <span :style="'font-size:10px;color:' + (proxyStatus === 'online' ? 'var(--cyan)' : 'var(--red)')" x-text="proxyStatus === 'online' ? 'online :8082' : 'offline'"></span>
    </div>

    <!-- Nav -->
    <div style="flex:1;overflow-y:auto;padding:4px 0;">
      <template x-for="section in navSections" :key="section.id">
        <button
          @click="activeSection = section.id; scrollToSection(section.id)"
          :class="['nv-item', activeSection === section.id ? 'active' : '']"
        >
          <span style="font-size:11px;" x-text="section.icon"></span>
          <span x-text="section.label"></span>
          <span x-show="hasPendingChanges(section.id)" style="margin-left:auto;width:5px;height:5px;border-radius:50%;background:var(--amber);display:inline-block;"></span>
        </button>
      </template>
    </div>

    <!-- Save / discard -->
    <div style="padding:10px;border-top:1px solid var(--border);">
      <button
        @click="saveAll()"
        :disabled="Object.keys(pendingChanges).length === 0 || saving"
        :style="Object.keys(pendingChanges).length > 0 ? 'background:rgba(0,217,255,.08);border:1px solid var(--cyan);color:var(--cyan);cursor:pointer;' : 'background:var(--faint);border:1px solid var(--border);color:var(--muted);cursor:not-allowed;'"
        style="width:100%;padding:7px;font-family:var(--font);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;"
      >
        <span x-show="!saving">
          <span x-show="Object.keys(pendingChanges).length > 0">SAVE <span x-text="Object.keys(pendingChanges).length"></span></span>
          <span x-show="Object.keys(pendingChanges).length === 0">NO CHANGES</span>
        </span>
        <span x-show="saving">
          <svg style="width:10px;height:10px;animation:spin .8s linear infinite" viewBox="0 0 24 24" fill="none"><circle opacity=".25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path opacity=".75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
          SAVING...
        </span>
      </button>
      <button
        @click="discardChanges()"
        x-show="Object.keys(pendingChanges).length > 0"
        style="width:100%;margin-top:4px;padding:4px;background:none;border:none;font-family:var(--font);font-size:9px;color:var(--muted);cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:color .12s;"
        @mouseover="$el.style.color='var(--text)'" @mouseout="$el.style.color='var(--muted)'"
      >discard</button>
    </div>
  </aside>

  <!-- ══ MAIN ════════════════════════════════════════════════════ -->
  <main style="flex:1;overflow-y:auto;background:var(--bg);" id="main-scroll">

    <!-- Top bar -->
    <div class="topbar" style="position:sticky;top:0;z-index:10;">
      <span style="font-size:10px;color:var(--dim);">
        <span class="blink" style="color:var(--cyan);">▋</span>&nbsp;
        <span x-text="loading ? 'loading...' : settings.groups.length + ' groups · ' + Object.keys(settings.values).length + ' parameters'"></span>
      </span>
      <button
        @click="loadAll()"
        style="margin-left:auto;background:none;border:none;font-family:var(--font);font-size:10px;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:4px;transition:color .12s;"
        @mouseover="$el.style.color='var(--cyan)'" @mouseout="$el.style.color='var(--muted)'"
      >
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
        refresh
      </button>
    </div>

    <!-- Loading -->
    <div x-show="loading" style="display:flex;align-items:center;justify-content:center;height:200px;">
      <span style="font-size:11px;color:var(--muted);">
        <svg style="width:12px;height:12px;animation:spin .8s linear infinite;display:inline;margin-right:6px;" viewBox="0 0 24 24" fill="none"><circle opacity=".25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path opacity=".75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        loading configuration...
      </span>
    </div>

    <div x-show="!loading" style="padding:20px;display:flex;flex-direction:column;gap:24px;">

      <!-- ── RELIABILITY ──────────────────────────────────────── -->
      <section id="section-reliability">
        <div class="sec-head">
          <span class="sec-head-label">Reliability Score</span>
          <span style="font-size:9px;color:var(--muted);margin-left:auto;">24h window</span>
        </div>
        <div class="card fi-in">
          <div x-show="!reliability.loaded" style="padding:20px;color:var(--muted);font-size:10px;">awaiting data...</div>
          <div x-show="reliability.loaded" style="padding:16px;display:flex;gap:24px;flex-wrap:wrap;">

            <!-- ASCII grade block -->
            <div style="flex-shrink:0;">
              <div
                :class="'grade-box grade-' + (reliability.grade || 'F')"
                style="line-height:1.4;"
              >
                <span x-text="
                  '┌──────┐\n│  ' + (reliability.grade || '?') + '   │\n└──────┘'
                " style="white-space:pre;font-size:13px;font-weight:700;letter-spacing:0;"></span>
              </div>
              <div style="font-size:10px;color:var(--dim);margin-top:6px;text-align:center;" x-text="reliability.score ? (reliability.score * 100).toFixed(1) + '%' : '--'"></div>
              <div style="font-size:9px;color:var(--muted);text-align:center;" x-text="(reliability.total_requests || 0) + ' req'"></div>
            </div>

            <!-- Component gauges -->
            <div style="flex:1;min-width:200px;display:flex;flex-direction:column;gap:10px;">
              <template x-for="(value, key) in (reliability.components || {})" :key="key">
                <div>
                  <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                    <span style="font-size:10px;color:var(--dim);" x-text="key.replace(/_/g,' ')"></span>
                    <span style="font-size:10px;font-weight:500;" :style="'color:' + getGaugeColor(value)" x-text="(value * 100).toFixed(1) + '%'"></span>
                  </div>
                  <div class="gauge">
                    <div class="gauge-fill" :style="'width:' + (value*100) + '%;background:' + getGaugeColor(value)"></div>
                  </div>
                </div>
              </template>
            </div>

            <!-- Error breakdown -->
            <div x-show="Object.keys(reliability.error_breakdown || {}).length > 0" style="min-width:140px;">
              <div style="font-size:9px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:8px;border-left:2px solid var(--red);padding-left:6px;">Error Breakdown</div>
              <template x-for="(count, type) in (reliability.error_breakdown || {})" :key="type">
                <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
                  <span style="font-size:10px;color:var(--red);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="type"></span>
                  <span style="font-size:10px;color:var(--muted);" x-text="'×'+count"></span>
                </div>
              </template>
            </div>

          </div>
        </div>
      </section>

      <!-- ── CIRCUIT BREAKERS ─────────────────────────────────── -->
      <section id="section-breakers">
        <div class="sec-head">
          <span class="sec-head-label">Circuit Breakers</span>
          <span style="font-size:9px;color:var(--muted);margin-left:auto;">live state</span>
        </div>
        <div class="card fi-in">
          <div x-show="!breakers.length" style="padding:14px;font-size:10px;color:var(--muted);">── no breakers active ──</div>
          <div x-show="breakers.length > 0">
            <template x-for="(b, i) in breakers" :key="b.model">
              <div style="display:flex;align-items:center;gap:12px;padding:8px 14px;border-bottom:1px solid var(--line);" :style="i === breakers.length - 1 ? 'border-bottom:none' : ''">
                <span
                  :class="'b-' + (b.state === 'half_open' ? 'half' : b.state)"
                  style="font-size:10px;font-weight:600;min-width:64px;text-align:center;"
                  x-text="'[' + b.state.toUpperCase().replace('_',' ') + ']'"
                ></span>
                <span style="flex:1;font-size:11px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" x-text="b.model"></span>
                <span style="font-size:10px;color:var(--muted);" x-text="b.failure_count + 'F'"></span>
                <span x-show="b.cooldown_remaining_s > 0" style="font-size:10px;color:var(--amber);" x-text="b.cooldown_remaining_s.toFixed(0)+'s'"></span>
                <button
                  @click="resetBreaker(b.model)"
                  x-show="b.state === 'open'"
                  style="font-size:9px;font-family:var(--font);background:none;border:1px solid var(--border);color:var(--muted);padding:2px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.06em;transition:all .12s;"
                  @mouseover="$el.style.borderColor='var(--cyan)';$el.style.color='var(--cyan)'"
                  @mouseout="$el.style.borderColor='var(--border)';$el.style.color='var(--muted)'"
                >reset</button>
              </div>
            </template>
          </div>
        </div>
      </section>

      <!-- ── DYNAMIC SETTINGS GROUPS ──────────────────────────── -->
      <template x-for="groupId in displayGroups" :key="groupId">
        <section :id="'section-' + groupId" class="fi-in">
          <!-- Section header -->
          <div class="sec-head">
            <span class="sec-head-label" x-text="settings.group_labels[groupId] || groupId"></span>
            <span style="font-size:9px;color:var(--dim);" x-text="getGroupIcon(groupId)"></span>
            <div x-show="hasPendingChanges(groupId)" style="margin-left:auto;display:flex;align-items:center;gap:4px;">
              <span style="width:5px;height:5px;background:var(--amber);border-radius:50%;display:inline-block;"></span>
              <span style="font-size:9px;color:var(--amber);" x-text="countGroupChanges(groupId) + ' unsaved'"></span>
            </div>
          </div>

          <!-- Settings grid -->
          <div class="card settings-grid">
            <template x-for="(setting, idx) in getGroupSettings(groupId)" :key="setting.env_var">
              <div class="fr">
                <!-- Left: label + description -->
                <div style="min-width:0;">
                  <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;">
                    <span style="font-size:11px;font-weight:500;color:var(--text);" x-text="formatLabel(setting.env_var)"></span>
                    <span x-show="setting.units" style="font-size:8px;color:var(--muted);padding:1px 4px;border:1px solid var(--faint);text-transform:uppercase;letter-spacing:.06em;" x-text="setting.units"></span>
                    <span x-show="setting.secret" style="font-size:9px;color:var(--muted);">🔒</span>
                    <span x-show="isModified(setting.env_var)" class="mod-pill">mod</span>
                  </div>
                  <div style="font-size:10px;color:var(--muted);line-height:1.4;" x-text="setting.description"></div>
                  <div x-show="setting.min_val !== null || setting.max_val !== null" style="font-size:9px;color:var(--faint);margin-top:2px;">
                    <span x-text="(setting.min_val !== null ? setting.min_val : '') + (setting.min_val !== null && setting.max_val !== null ? ' – ' : '') + (setting.max_val !== null ? setting.max_val : '')"></span>
                  </div>
                </div>

                <!-- Right: control -->
                <div class="ctrl" style="display:flex;align-items:flex-start;justify-content:flex-end;">

                  <!-- Bool toggle -->
                  <div x-show="setting.type === 'bool'" style="display:flex;align-items:center;gap:6px;padding-top:2px;">
                    <label class="tgl">
                      <input type="checkbox"
                        :checked="getBoolValue(setting.env_var)"
                        @change="setBoolValue(setting.env_var, $event.target.checked)"
                      >
                      <div class="tgl-track"></div>
                    </label>
                    <span style="font-size:10px;" :style="getBoolValue(setting.env_var) ? 'color:var(--cyan)' : 'color:var(--muted)'" x-text="getBoolValue(setting.env_var) ? 'ON' : 'OFF'"></span>
                  </div>

                  <!-- Select -->
                  <div x-show="setting.choices && setting.choices.length > 0 && setting.type !== 'bool'" style="width:100%;">
                    <select
                      :class="['fs', isModified(setting.env_var) ? 'mod' : '']"
                      :value="getCurrentValue(setting.env_var)"
                      @change="setValue(setting.env_var, $event.target.value)"
                    >
                      <template x-for="choice in setting.choices" :key="choice">
                        <option :value="choice" :selected="getCurrentValue(setting.env_var) === choice" x-text="choice"></option>
                      </template>
                    </select>
                  </div>

                  <!-- Text / number -->
                  <div x-show="!setting.choices && setting.type !== 'bool'" style="width:100%;">
                    <input
                      :type="setting.type === 'int' || setting.type === 'float' ? 'number' : (setting.secret ? 'password' : 'text')"
                      :class="['fi', isModified(setting.env_var) ? 'mod' : '']"
                      :value="getCurrentValue(setting.env_var)"
                      :placeholder="setting.default !== null ? String(setting.default) : ''"
                      :step="setting.type === 'float' ? '0.01' : '1'"
                      :min="setting.min_val"
                      :max="setting.max_val"
                      @input="setValue(setting.env_var, $event.target.value)"
                    >
                  </div>

                </div>
              </div>
            </template>
          </div>
        </section>
      </template>

    </div><!-- /!loading -->
  </main>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>

<script>
function proxySettings() {
  return {
    loading: true,
    saving: false,
    proxyStatus: 'checking',
    settings: { values: {}, meta: {}, groups: [], group_labels: {} },
    pendingChanges: {},
    reliability: { loaded: false },
    breakers: [],
    activeSection: 'reliability',
    toast: { show: false, message: '', type: 'success' },

    // Sections shown in settings groups (excluding reliability/breakers, shown separately)
    displayGroups: ['models', 'reasoning', 'budget', 'router_slots', 'compression', 'local_gpu', 'circuit_breaker', 'toolcalls', 'server', 'auth', 'logging', 'usage_tracking', 'watchdog'],

    navSections: [
      { id: 'reliability', label: 'Reliability', icon: '📊' },
      { id: 'breakers', label: 'Breakers', icon: '⚡' },
      { id: 'models', label: 'Models', icon: '🤖' },
      { id: 'reasoning', label: 'Reasoning', icon: '🧠' },
      { id: 'budget', label: 'Budgets', icon: '💰' },
      { id: 'router_slots', label: 'Router Slots', icon: '🗺️' },
      { id: 'compression', label: 'Compression', icon: '🗜️' },
      { id: 'local_gpu', label: 'Local GPU', icon: '🖥️' },
      { id: 'circuit_breaker', label: 'Circuit Breaker', icon: '🔄' },
      { id: 'toolcalls', label: 'Tool Calls', icon: '🔧' },
      { id: 'server', label: 'Server', icon: '🌐' },
      { id: 'auth', label: 'Auth & Keys', icon: '🔑' },
      { id: 'logging', label: 'Logging', icon: '📋' },
      { id: 'usage_tracking', label: 'Usage Tracking', icon: '📈' },
      { id: 'watchdog', label: 'Watchdog', icon: '🐕' },
    ],

    async init() {
      await this.loadAll();
      // Check proxy status
      fetch('/health').then(r => { this.proxyStatus = r.ok ? 'online' : 'offline'; }).catch(() => { this.proxyStatus = 'offline'; });
    },

    async loadAll() {
      this.loading = true;
      try {
        const [settingsRes, relRes, breakersRes] = await Promise.allSettled([
          fetch('/api/settings'),
          fetch('/api/reliability?hours=24'),
          fetch('/api/breakers'),
        ]);

        if (settingsRes.status === 'fulfilled' && settingsRes.value.ok) {
          this.settings = await settingsRes.value.json();
          // Filter displayGroups to only those that exist in the manifest
          this.displayGroups = this.displayGroups.filter(g => this.settings.groups.includes(g));
        }

        if (relRes.status === 'fulfilled' && relRes.value.ok) {
          const rel = await relRes.value.json();
          this.reliability = { ...rel, loaded: true };
        }

        if (breakersRes.status === 'fulfilled' && breakersRes.value.ok) {
          const br = await breakersRes.value.json();
          this.breakers = br.breakers || [];
        }
      } catch (e) {
        this.showToast('Failed to load settings: ' + e.message, 'error');
      } finally {
        this.loading = false;
      }
    },

    getGroupSettings(groupId) {
      if (!this.settings.meta) return [];
      return Object.values(this.settings.meta).filter(s => s.group === groupId);
    },

    getCurrentValue(envVar) {
      const key = envVar.toLowerCase();
      if (key in this.pendingChanges) return this.pendingChanges[key];
      const val = this.settings.values[key];
      return val !== null && val !== undefined ? String(val) : '';
    },

    getBoolValue(envVar) {
      const v = this.getCurrentValue(envVar);
      return v === 'True' || v === 'true' || v === '1' || v === true;
    },

    setValue(envVar, value) {
      const key = envVar.toLowerCase();
      const original = this.settings.values[key];
      if (String(value) === String(original)) {
        delete this.pendingChanges[key];
      } else {
        this.pendingChanges[key] = value;
      }
    },

    setBoolValue(envVar, checked) {
      this.setValue(envVar, checked ? 'true' : 'false');
    },

    isModified(envVar) {
      return envVar.toLowerCase() in this.pendingChanges;
    },

    hasPendingChanges(groupId) {
      if (groupId === 'reliability' || groupId === 'breakers') return false;
      const groupSettings = this.getGroupSettings(groupId);
      return groupSettings.some(s => s.env_var.toLowerCase() in this.pendingChanges);
    },

    countGroupChanges(groupId) {
      const groupSettings = this.getGroupSettings(groupId);
      return groupSettings.filter(s => s.env_var.toLowerCase() in this.pendingChanges).length;
    },

    async saveAll() {
      if (Object.keys(this.pendingChanges).length === 0 || this.saving) return;
      this.saving = true;
      try {
        // Convert lowercase keys back to uppercase ENV_VAR format
        const settingsPayload = {};
        for (const [key, value] of Object.entries(this.pendingChanges)) {
          // Find the original ENV_VAR name
          const meta = this.settings.meta[key];
          const envVar = meta ? meta.env_var : key.toUpperCase();
          settingsPayload[envVar] = value;
        }

        const res = await fetch('/api/settings', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ settings: settingsPayload, persist: true }),
        });

        if (res.ok) {
          const data = await res.json();
          // Update local values
          for (const [key, value] of Object.entries(this.pendingChanges)) {
            this.settings.values[key] = value;
          }
          this.pendingChanges = {};
          this.showToast('✓ saved ' + data.count + ' setting' + (data.count !== 1 ? 's' : ''), 'success');
          if (data.skipped && Object.keys(data.skipped).length > 0) {
            console.warn('Skipped settings:', data.skipped);
          }
        } else {
          const err = await res.json().catch(() => ({}));
          this.showToast('save failed: ' + (err.detail || res.statusText), 'error');
        }
      } catch (e) {
        this.showToast('save error: ' + e.message, 'error');
      } finally {
        this.saving = false;
      }
    },

    discardChanges() {
      this.pendingChanges = {};
    },

    async resetBreaker(model) {
      try {
        const res = await fetch(`/api/breakers/${encodeURIComponent(model)}/reset`, { method: 'POST' });
        if (res.ok) {
          this.showToast('✓ reset: ' + model, 'success');
          // Refresh breakers
          const br = await fetch('/api/breakers').then(r => r.json());
          this.breakers = br.breakers || [];
        }
      } catch (e) {
        this.showToast('reset failed: ' + e.message, 'error');
      }
    },

    scrollToSection(sectionId) {
      const el = document.getElementById('section-' + sectionId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    },

    showToast(message, type = 'success') {
      this.toast = { show: true, message, type };
      setTimeout(() => { this.toast.show = false; }, 3500);
    },

    formatLabel(envVar) {
      // ENV_VAR → Nice Label
      return envVar.replace(/_/g, ' ').toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
    },

    getGroupIcon(groupId) {
      const icons = {
        models: '🤖', budget: '💰', router_slots: '🗺️', compression: '🗜️',
        local_gpu: '🖥️', circuit_breaker: '🔄', server: '🌐', auth: '🔑',
        logging: '📋', toolcalls: '🔧', usage_tracking: '📈', watchdog: '🐕',
        reasoning: '🧠',
      };
      return icons[groupId] || '⚙️';
    },

    getGaugeColor(value) {
      if (value >= 0.85) return '#22c55e';
      if (value >= 0.65) return '#00d9ff';
      if (value >= 0.50) return '#f59e0b';
      return '#f87171';
    },
  };
}
</script>
</body>
</html>
